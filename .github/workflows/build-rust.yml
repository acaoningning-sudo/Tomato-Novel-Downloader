name: Build Rust Downloader

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (windows-amd64)
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        shell: pwsh
        run: |
          cargo build --release --no-default-features --features "tts-native"

      - name: Bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tomato-downloader-windows
          path: target/release/tomato-novel-downloader.exe
