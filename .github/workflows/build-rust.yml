name: Build Rust Downloader

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build (linux-amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout A Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        # 使用 --no-default-features 绕过缺失的 tomato-novel-official-api 依赖
        # 并显式开启 tts-native 功能
        run: cargo build --release --no-default-features --features "tts-native"

      - name: Bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tomato-downloader-linux
          path: target/release/tomato-novel-downloader
